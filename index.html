<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 미세먼지 경보 대시보드</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container-main { max-width: 1400px; margin: 0 auto; }

        .header { text-align: center; color: white; margin-bottom: 40px; animation: fadeIn 0.8s ease-in; }
        .header h1 { font-size: 2.5rem; font-weight: 700; text-shadow: 2px 2px 4px rgba(0,0,0,.3); margin-bottom: 10px; }
        .header p  { font-size: 1.1rem; opacity: .9; }
        .header .updated { font-size: 0.9rem; opacity: 0.75; margin-top: 8px; }

        .refresh-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,.2); border: 2px solid rgba(255,255,255,.6);
            color: white; padding: 10px 24px; border-radius: 50px; font-size: 1rem;
            cursor: pointer; transition: all .3s ease; margin-top: 16px; backdrop-filter: blur(4px);
        }
        .refresh-btn:hover    { background: rgba(255,255,255,.35); transform: scale(1.05); }
        .refresh-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

        .error-alert {
            display: none; background: #f8d7da; color: #721c24;
            padding: 15px 20px; border-radius: 10px; border-left: 4px solid #f5c6cb; margin-bottom: 20px;
        }

        .loading-state { display: none; text-align: center; padding: 80px 20px; color: white; }
        .spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(255,255,255,.3); border-top-color: white;
            border-radius: 50%; animation: spin .9s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-state p { font-size: 1.2rem; opacity: .9; }

        .stats-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: white; border-radius: 15px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,.2); text-align: center;
            transition: transform .3s ease, box-shadow .3s ease;
        }
        .stat-card:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(0,0,0,.3); }
        .stat-value { font-size: 2.5rem; font-weight: 700; color: #667eea; margin: 10px 0; }
        .stat-label { color: #666; font-size: .95rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-icon  { font-size: 2rem; margin-bottom: 10px; }

        .charts-container { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
        .sub-charts-row   { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }

        .chart-card {
            background: white; border-radius: 15px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,.2); min-height: 500px;
        }
        .chart-card.main-top10 {
            min-height: 600px;
            background: linear-gradient(135deg, rgba(102,126,234,.05) 0%, rgba(118,75,162,.05) 100%);
            border: 2px solid #667eea;
        }
        .chart-card h3 { color: #333; margin-bottom: 20px; font-size: 1.3rem; font-weight: 600; }
        .chart-card.main-top10 h3 { color: #667eea; font-size: 1.5rem; font-weight: 700; }

        .table-container {
            background: white; border-radius: 15px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,.2); overflow-x: auto;
        }
        .table { margin-bottom: 0; }
        .table thead { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .table tbody tr:hover { background-color: #f8f9fa; transition: all .3s ease; }

        .badge-warning  { background-color: #FFA500 !important; color: white; }
        .badge-alert    { background-color: #FF6347 !important; color: white; }
        .badge-critical { background-color: #8B0000 !important; color: white; }
        .badge-default  { background-color: #6c757d !important; color: white; }

        .empty-state { display: none; text-align: center; padding: 60px 20px; color: white; }
        .empty-state h2 { font-size: 2rem; margin-bottom: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .sub-charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container-main">

    <div class="header">
        <h1>🌍 미세먼지 경보 대시보드</h1>
        <p id="subtitle">한국환경공단 에어코리아 미세먼지 경보 발령 현황</p>
        <p class="updated" id="updated"></p>
        <button class="refresh-btn" id="refreshBtn" onclick="init()">🔄 새로고침</button>
    </div>

    <div class="error-alert" id="errorAlert"></div>

    <div class="loading-state" id="loading">
        <div class="spinner"></div>
        <p>데이터를 불러오는 중입니다…</p>
    </div>

    <div class="empty-state" id="emptyState">
        <h2>📭 데이터 없음</h2>
        <p>현재 발령된 미세먼지 경보가 없습니다.</p>
    </div>

    <div id="mainContent" style="display:none;">

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-label">총 경보 발령</div>
                <div class="stat-value" id="stat-total">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📍</div>
                <div class="stat-label">영향 지역</div>
                <div class="stat-value" id="stat-districts">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🗺️</div>
                <div class="stat-label">영향 권역</div>
                <div class="stat-value" id="stat-regions">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚠️</div>
                <div class="stat-label">주요 단계</div>
                <div class="stat-value" id="stat-level" style="font-size:1.8rem;">—</div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-card main-top10">
                <h3>📊 지역별 경보 발령 현황 TOP 10</h3>
                <div id="chart1" style="height:520px;"></div>
            </div>
            <div class="sub-charts-row">
                <div class="chart-card">
                    <h3>⚠️ 경보 단계별 분포</h3>
                    <div id="chart2" style="height:420px;"></div>
                </div>
                <div class="chart-card">
                    <h3>🗺️ 권역별 경보 발령 현황</h3>
                    <div id="chart3" style="height:420px;"></div>
                </div>
            </div>
        </div>

        <div class="table-container">
            <h3 style="margin-bottom:20px; color:#333;">📋 상세 경보 발령 현황</h3>
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>🔢</th><th>지역</th><th>권역</th>
                        <th>경보 단계</th><th>발령일</th><th>해제일</th>
                    </tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════
//  data.json 읽기 (GitHub Actions가 매일 갱신)
// ══════════════════════════════════════════════════════════
async function fetchData() {
    // 캐시 무효화를 위해 쿼리 추가
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) {
        throw new Error(`data.json을 찾을 수 없습니다 (HTTP ${res.status}). GitHub Actions가 한 번 실행되어야 파일이 생성됩니다.`);
    }
    return res.json();
}

// ══════════════════════════════════════════════════════════
//  통계 계산
// ══════════════════════════════════════════════════════════
function computeStats(items) {
    const districts = new Set(items.map(i => i.districtName).filter(Boolean));
    const regions   = new Set(items.map(i => i.moveName).filter(Boolean));
    const levelMap  = {};
    items.forEach(i => { const k = i.issueGbn || '기타'; levelMap[k] = (levelMap[k] || 0) + 1; });
    const mostCommon = Object.entries(levelMap).sort((a, b) => b[1] - a[1])[0]?.[0] ?? '-';
    return { total: items.length, districts: districts.size, regions: regions.size, mostCommon };
}

// ══════════════════════════════════════════════════════════
//  차트
// ══════════════════════════════════════════════════════════
const CHART_BASE = {
    paper_bgcolor: 'transparent',
    plot_bgcolor : 'transparent',
    font: { family: 'Segoe UI, sans-serif' },
};

function renderChart1(items) {
    const count = {};
    items.forEach(i => { const k = i.districtName || '기타'; count[k] = (count[k] || 0) + 1; });
    const sorted = Object.entries(count).sort((a, b) => b[1] - a[1]).slice(0, 10).reverse();

    Plotly.newPlot('chart1', [{
        type: 'bar', orientation: 'h',
        x: sorted.map(([, v]) => v),
        y: sorted.map(([k]) => k),
        marker: {
            color: sorted.map((_, i) => `rgba(102,126,234,${.42 + .058 * i})`),
            line : { color: '#667eea', width: 1 },
        },
        text: sorted.map(([, v]) => String(v)), textposition: 'outside',
    }], {
        ...CHART_BASE,
        margin: { l: 140, r: 70, t: 20, b: 50 },
        xaxis : { title: '경보 발령 횟수', gridcolor: '#eee' },
        yaxis : { automargin: true },
    }, { responsive: true });
}

function renderChart2(items) {
    const count = {};
    items.forEach(i => { const k = i.issueGbn || '기타'; count[k] = (count[k] || 0) + 1; });
    const labels = Object.keys(count);
    const values = Object.values(count);
    const colors = labels.map(l => {
        if (l.includes('중대')) return '#8B0000';
        if (l.includes('경보')) return '#FF6347';
        if (l.includes('주의')) return '#FFA500';
        return '#6c757d';
    });

    Plotly.newPlot('chart2', [{
        type: 'pie', labels, values,
        marker   : { colors, line: { color: '#fff', width: 2 } },
        textinfo : 'label+percent', hoverinfo: 'label+value+percent',
        hole     : 0.35,
    }], {
        ...CHART_BASE,
        margin    : { l: 20, r: 20, t: 20, b: 20 },
        showlegend: true,
        legend    : { orientation: 'h', y: -0.15 },
    }, { responsive: true });
}

function renderChart3(items) {
    const count = {};
    items.forEach(i => { const k = i.moveName || '기타'; count[k] = (count[k] || 0) + 1; });
    const sorted = Object.entries(count).sort((a, b) => b[1] - a[1]);

    Plotly.newPlot('chart3', [{
        type: 'bar',
        x: sorted.map(([k]) => k),
        y: sorted.map(([, v]) => v),
        marker: { color: sorted.map((_, i) => `rgba(118,75,162,${.38 + .062 * Math.min(i, 9)})`) },
        text: sorted.map(([, v]) => String(v)), textposition: 'outside',
    }], {
        ...CHART_BASE,
        margin: { l: 50, r: 30, t: 20, b: 110 },
        xaxis : { tickangle: -40, automargin: true },
        yaxis : { title: '경보 발령 횟수', gridcolor: '#eee' },
    }, { responsive: true });
}

// ══════════════════════════════════════════════════════════
//  테이블
// ══════════════════════════════════════════════════════════
function badgeClass(g) {
    if (!g)             return 'default';
    if (g.includes('중대')) return 'critical';
    if (g.includes('경보')) return 'alert';
    if (g.includes('주의')) return 'warning';
    return 'default';
}

function renderTable(items) {
    document.getElementById('dataTable').innerHTML = items.map((item, idx) => `
        <tr>
            <td>${idx + 1}</td>
            <td>${item.districtName || '-'}</td>
            <td>${item.moveName    || '-'}</td>
            <td><span class="badge badge-${badgeClass(item.issueGbn)}">${item.issueGbn || '-'}</span></td>
            <td>${item.issueDate   || '-'}${item.issueTime ? ' ' + item.issueTime : ''}</td>
            <td>${item.clearDate   || '-'}${item.clearTime ? ' ' + item.clearTime : ''}</td>
        </tr>`).join('');
}

// ══════════════════════════════════════════════════════════
//  UI 헬퍼
// ══════════════════════════════════════════════════════════
const $    = id => document.getElementById(id);
const show = id => { $(id).style.display = 'block'; };
const hide = id => { $(id).style.display = 'none';  };

// ══════════════════════════════════════════════════════════
//  메인 진입점
// ══════════════════════════════════════════════════════════
async function init() {
    ['errorAlert', 'emptyState', 'mainContent'].forEach(hide);
    show('loading');
    $('refreshBtn').disabled = true;

    try {
        const data  = await fetchData();
        const items = data.items || [];
        hide('loading');
        $('refreshBtn').disabled = false;

        if (items.length === 0) { show('emptyState'); return; }

        // 헤더 정보 업데이트
        $('subtitle').textContent =
            `한국환경공단 에어코리아 ${data.year}년 미세먼지 경보 발령 현황 (총 ${data.total}건)`;
        $('updated').textContent =
            `마지막 갱신 : ${data.updated_at}`;

        show('mainContent');

        // 통계
        const stats = computeStats(items);
        $('stat-total').textContent     = stats.total;
        $('stat-districts').textContent = stats.districts;
        $('stat-regions').textContent   = stats.regions;
        $('stat-level').textContent     = stats.mostCommon;

        // 시각화
        renderChart1(items);
        renderChart2(items);
        renderChart3(items);
        renderTable(items);

    } catch (err) {
        hide('loading');
        $('refreshBtn').disabled = false;
        const el = $('errorAlert');
        el.textContent   = `⚠️ ${err.message}`;
        el.style.display = 'block';
        console.error(err);
    }
}

init();
</script>
</body>
</html>
